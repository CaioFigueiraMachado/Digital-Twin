<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verseal VR Museum - Realista</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
}
</style>

</head>

<body>

<a-scene fog="type: linear; color: #e0e0e0; near: 15; far: 35">

<!-- ASSETS -->
<a-assets>
<!-- Texturas built-in do Three.js (sempre funcionam) -->
<img id="textura-parede" src="https://threejs.org/examples/textures/brick_diffuse.jpg">
<img id="textura-piso" src="https://threejs.org/examples/textures/hardwood2_diffuse.jpg">
<img id="textura-teto" src="https://threejs.org/examples/textures/plaster.jpg">
<img id="textura-madeira" src="https://threejs.org/examples/textures/wood.jpg">
<img id="textura-marmore" src="https://threejs.org/examples/textures/marble.jpg">

<audio id="music" src="https://cdn.freesound.org/previews/240/240776_3692867-lq.mp3" crossorigin="anonymous"></audio>
</a-assets>

<!-- MÚSICA AMBIENTE -->
<a-entity sound="src:#music; autoplay:true; loop:true; volume:0.15"></a-entity>

<!-- CHÃO COM TEXTURA DE MADEIRA -->
<a-plane rotation="-90 0 0"
width="50"
height="50"
src="#textura-piso"
repeat="15 15"
metalness="0.2"
roughness="0.7"
color="#d4a76a">
</a-plane>

<!-- TETO COM TEXTURA -->
<a-plane rotation="90 0 0"
position="0 7 0"
width="50"
height="50"
src="#textura-teto"
repeat="10 10"
metalness="0"
roughness="0.9"
color="#f0f0f0">
</a-plane>

<!-- PAREDE FUNDO COM TEXTURA DE TIJOLO (mais realista) -->
<a-box position="0 3.5 -15"
width="30"
height="7"
depth="0.5"
src="#textura-parede"
repeat="15 3.5"
metalness="0.1"
roughness="0.8"
color="#b85e3a">
</a-box>

<!-- PAREDE ESQUERDA COM TEXTURA DE MADEIRA -->
<a-box position="-15 3.5 0"
width="0.5"
height="7"
depth="30"
src="#textura-madeira"
repeat="1 3.5 15"
metalness="0.2"
roughness="0.6"
color="#a67c52">
</a-box>

<!-- PAREDE DIREITA COM TEXTURA DE MADEIRA -->
<a-box position="15 3.5 0"
width="0.5"
height="7"
depth="30"
src="#textura-madeira"
repeat="1 3.5 15"
metalness="0.2"
roughness="0.6"
color="#a67c52">
</a-box>

<!-- RODAPÉS DE MÁRMORE -->
<a-box position="-12 0.2 -14.5" width="4" height="0.3" depth="0.4" src="#textura-marmore" color="#cccccc"></a-box>
<a-box position="-4 0.2 -14.5" width="4" height="0.3" depth="0.4" src="#textura-marmore" color="#cccccc"></a-box>
<a-box position="4 0.2 -14.5" width="4" height="0.3" depth="0.4" src="#textura-marmore" color="#cccccc"></a-box>
<a-box position="12 0.2 -14.5" width="4" height="0.3" depth="0.4" src="#textura-marmore" color="#cccccc"></a-box>

<!-- MOLDURAS DE ACABAMENTO NO TETO -->
<a-ring radius-inner="14.5" radius-outer="15" rotation="90 0 0" position="0 6.8 0" color="#c0a080" opacity="0.5"></a-ring>

<!-- ILUMINAÇÃO MAIS NATURAL -->
<!-- Luz Ambiente Suave -->
<a-light type="ambient" intensity="0.6" color="#fffaf0"></a-light>

<!-- Luz Direcional Principal (simulando sol) -->
<a-light type="directional"
position="5 12 10"
intensity="1"
color="#fff5e6"
castshadow="true"
shadow-mapSize-width="2048"
shadow-mapSize-height="2048">
</a-light>

<!-- Luz Direcional de Preenchimento -->
<a-light type="directional"
position="-5 8 5"
intensity="0.5"
color="#e6f0fa">
</a-light>

<!-- Spots no teto (iluminação de galeria) -->
<a-light type="point" position="-8 6.5 -10" intensity="0.8" color="#ffffff" distance="15"></a-light>
<a-light type="point" position="0 6.5 -10" intensity="0.8" color="#ffffff" distance="15"></a-light>
<a-light type="point" position="8 6.5 -10" intensity="0.8" color="#ffffff" distance="15"></a-light>

<a-light type="point" position="-8 6.5 -5" intensity="0.6" color="#ffffff" distance="12"></a-light>
<a-light type="point" position="8 6.5 -5" intensity="0.6" color="#ffffff" distance="12"></a-light>

<!-- CÂMERA -->
<a-entity position="0 1.8 8">
<a-camera wasd-controls="acceleration:20"
          look-controls="pointerLockEnabled:true"
          near="0.1"
          far="1000">
</a-camera>
</a-entity>

<!-- ELEMENTOS DECORATIVOS REALISTAS -->
<!-- Colunas de mármore -->
<a-cylinder position="-14 2 -12" radius="0.5" height="4" src="#textura-marmore" color="#e0e0e0" metalness="0.1" roughness="0.3"></a-cylinder>
<a-cylinder position="14 2 -12" radius="0.5" height="4" src="#textura-marmore" color="#e0e0e0" metalness="0.1" roughness="0.3"></a-cylinder>

<!-- Capitéis das colunas -->
<a-torus position="-14 4.2 -12" radius="0.5" radius-tubular="0.08" color="#d4af37" rotation="90 0 0"></a-torus>
<a-torus position="14 4.2 -12" radius="0.5" radius-tubular="0.08" color="#d4af37" rotation="90 0 0"></a-torus>

<!-- Vasos decorativos -->
<a-cylinder position="-13 0.3 -8" radius="0.5" height="0.3" src="#textura-marmore" color="#b87333"></a-cylinder>
<a-cylinder position="-13 1.2 -8" radius="0.2" height="1.8" color="#2e7d32"></a-cylinder>
<a-sphere position="-13 2.2 -8" radius="0.4" color="#4caf50" emissive="#224422"></a-sphere>

<a-cylinder position="13 0.3 -8" radius="0.5" height="0.3" src="#textura-marmore" color="#b87333"></a-cylinder>
<a-cylinder position="13 1.2 -8" radius="0.2" height="1.8" color="#2e7d32"></a-cylinder>
<a-sphere position="13 2.2 -8" radius="0.4" color="#4caf50" emissive="#224422"></a-sphere>

<!-- Bancos de madeira -->
<a-box position="-10 0.2 -8" width="2.2" height="0.4" depth="1.2" src="#textura-madeira" color="#8b5a2b"></a-box>
<a-box position="-10 0.5 -8.2" width="2" height="0.1" depth="0.8" color="#c0a080"></a-box>

<a-box position="10 0.2 -8" width="2.2" height="0.4" depth="1.2" src="#textura-madeira" color="#8b5a2b"></a-box>
<a-box position="10 0.5 -8.2" width="2" height="0.1" depth="0.8" color="#c0a080"></a-box>

<!-- Tapete persa (decorativo) -->
<a-cylinder rotation="90 0 0" position="0 0.02 -8" radius="4" height="0.05" color="#8b4513" opacity="0.7"></a-cylinder>
<a-ring radius-inner="1" radius-outer="4" rotation="90 0 0" position="0 0.03 -8" color="#d4af37" opacity="0.3"></a-ring>

<!-- Letreiro dourado -->
<a-text value="VERSEAL VR MUSEUM"
position="0 6.5 -14.2"
align="center"
color="#d4af37"
scale="4 4 4"
width="10"
material="emissive: #443300">
</a-text>

<!-- Placas de direção -->
<a-text value="→ GALERIA 1"
position="-12 2 -14"
align="left"
color="#ffffff"
scale="1.5 1.5 1.5"
background="true"
background-color="#8b4513">
</a-text>

<a-text value="GALERIA 2 ←"
position="12 2 -14"
align="right"
color="#ffffff"
scale="1.5 1.5 1.5"
background="true"
background-color="#8b4513">
</a-text>

</a-scene>

<script>

const scene = document.querySelector("a-scene")

// Obras de arte com estilos variados
const obras = [
{titulo:"O Grito Digital", cor1:"#ff6b6b", cor2:"#4ecdc4", estilo:"moderno", x:-8},
{titulo:"Monalisa 2.0", cor1:"#ffd93d", cor2:"#6bcb77", estilo:"classico", x:0},
{titulo:"Noite Estrelada VR", cor1:"#6a4c93", cor2:"#1982c4", estilo:"abstrato", x:8}
]

obras.forEach(obra => {
const x = obra.x
const y = 3.2
const z = -14.7

// Moldura principal (dourada trabalhada)
const molduraExterna = document.createElement("a-box")
molduraExterna.setAttribute("position", `${x} ${y} ${z-0.1}`)
molduraExterna.setAttribute("width", "5.4")
molduraExterna.setAttribute("height", "5.4")
molduraExterna.setAttribute("depth", "0.25")
molduraExterna.setAttribute("color", "#d4af37")
molduraExterna.setAttribute("metalness", "0.6")
molduraExterna.setAttribute("roughness", "0.3")
scene.appendChild(molduraExterna)

// Moldura interna (entalhe)
const molduraInterna = document.createElement("a-box")
molduraInterna.setAttribute("position", `${x} ${y} ${z-0.08}`)
molduraInterna.setAttribute("width", "5.0")
molduraInterna.setAttribute("height", "5.0")
molduraInterna.setAttribute("depth", "0.2")
molduraInterna.setAttribute("color", "#8b7355")
molduraInterna.setAttribute("metalness", "0.2")
molduraInterna.setAttribute("roughness", "0.6")
scene.appendChild(molduraInterna)

// A obra de arte (composição abstrata)
const fundoObra = document.createElement("a-plane")
fundoObra.setAttribute("position", `${x} ${y} ${z}`)
fundoObra.setAttribute("width", "4.7")
fundoObra.setAttribute("height", "4.7")
fundoObra.setAttribute("color", obra.cor1)
scene.appendChild(fundoObra)

// Elementos artísticos diferentes para cada obra
if (obra.estilo === "moderno") {
  const forma1 = document.createElement("a-circle")
  forma1.setAttribute("position", `${x-0.8} ${y+0.5} ${z-0.01}`)
  forma1.setAttribute("radius", "0.8")
  forma1.setAttribute("color", obra.cor2)
  scene.appendChild(forma1)
  
  const forma2 = document.createElement("a-box")
  forma2.setAttribute("position", `${x+0.8} ${y-0.5} ${z-0.01}`)
  forma2.setAttribute("width", "1.2")
  forma2.setAttribute("height", "1.2")
  forma2.setAttribute("depth", "0.1")
  forma2.setAttribute("color", "#ffd93d")
  scene.appendChild(forma2)
} 
else if (obra.estilo === "classico") {
  const circulo = document.createElement("a-sphere")
  circulo.setAttribute("position", `${x} ${y+0.2} ${z-0.01}`)
  circulo.setAttribute("radius", "1")
  circulo.setAttribute("color", obra.cor2)
  scene.appendChild(circulo)
  
  const linha = document.createElement("a-box")
  linha.setAttribute("position", `${x} ${y-1} ${z-0.01}`)
  linha.setAttribute("width", "3")
  linha.setAttribute("height", "0.2")
  linha.setAttribute("depth", "0.1")
  linha.setAttribute("color", "#ffffff")
  scene.appendChild(linha)
}
else {
  // Abstrato
  for (let i = 0; i < 5; i++) {
    const forma = document.createElement("a-box")
    forma.setAttribute("position", `${x-1 + i*0.5} ${y-0.5 + i*0.3} ${z-0.01}`)
    forma.setAttribute("width", "0.3")
    forma.setAttribute("height", "0.3")
    forma.setAttribute("depth", "0.1")
    forma.setAttribute("color", i % 2 === 0 ? obra.cor2 : "#ffffff")
    scene.appendChild(forma)
  }
}

// Título da obra
const titulo = document.createElement("a-text")
titulo.setAttribute("value", obra.titulo)
titulo.setAttribute("position", `${x} ${y+2.9} ${z-0.15}`)
titulo.setAttribute("align", "center")
titulo.setAttribute("color", "#ffffff")
titulo.setAttribute("scale", "2 2 2")
titulo.setAttribute("background", "true")
titulo.setAttribute("background-color", "#8b4513")
scene.appendChild(titulo)

// Spotlight para cada obra
const luz = document.createElement("a-light")
luz.setAttribute("type", "spot")
luz.setAttribute("position", `${x} 6.5 ${z+2}`)
luz.setAttribute("target", `${x} ${y} ${z}`)
luz.setAttribute("angle", "25")
luz.setAttribute("penumbra", "0.3")
luz.setAttribute("intensity", "1.5")
luz.setAttribute("color", "#fff5e6")
scene.appendChild(luz)

// Placa do artista
const placa = document.createElement("a-box")
placa.setAttribute("position", `${x} ${y-2.4} ${z-0.12}`)
placa.setAttribute("width", "2.5")
placa.setAttribute("height", "0.3")
placa.setAttribute("depth", "0.1")
placa.setAttribute("color", "#5d3a1a")
scene.appendChild(placa)

const artista = document.createElement("a-text")
artista.setAttribute("value", "Artista VR • 2024")
artista.setAttribute("position", `${x} ${y-2.4} ${z-0.1}`)
artista.setAttribute("align", "center")
artista.setAttribute("color", "#d4af37")
artista.setAttribute("scale", "0.9 0.9 0.9")
scene.appendChild(artista)
})

// Luzes de piso (efeito galeria)
const cores = ["#ffaa00", "#ff6600", "#ff4400"]
for (let i = -12; i <= 12; i+=6) {
  const luzPiso = document.createElement("a-sphere")
  luzPiso.setAttribute("position", `${i} 0.15 -13`)
  luzPiso.setAttribute("radius", "0.15")
  luzPiso.setAttribute("color", cores[Math.floor(Math.random() * cores.length)])
  luzPiso.setAttribute("material", "emissive: #442200")
  scene.appendChild(luzPiso)
}

</script>

</body>
</html>
